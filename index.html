<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<title>My first three.js app</title>
		<style>
			body { margin: 0; overflow: hidden; }
			#c:focus-visible { outline: 3px solid #0078d4; outline-offset: -3px; }
			@keyframes spin { to { transform: rotate(360deg); } }
		</style>
	</head>
	<body>
		<div id="loading-overlay" role="status" aria-live="polite" style="position: fixed; inset: 0; background: #101010; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; font-family: sans-serif; z-index: 2000; transition: opacity 0.5s ease-out;">
			<div style="width: 50px; height: 50px; border: 5px solid rgba(255,255,255,0.1); border-top-color: #fff; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px;"></div>
			<span>Loading Universe...</span>
		</div>
        <canvas id="c" role="img" aria-label="3D Game Scene" tabindex="0"></canvas>
		<script async src="https://unpkg.com/es-module-shims@1.6.3/dist/es-module-shims.js"></script>
		<script type="importmap">
			{
				"imports": {
					"three": "https://unpkg.com/three@0.151.3/build/three.module.js",
					"three/addons/": "https://unpkg.com/three@0.151.3/examples/jsm/"
				}
			}
		</script>
		<script type="module" src="js/engine/main.js"></script>
	</body>
</html>
